<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Line Distribution</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="theme-color" content="#e9e9e7">
<style>
  :root{
    --bg:#e9e9e7; --ink:#111; --card:#fff; --glow:#ff8c1a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    padding:12px 12px 130px 12px;
    padding-bottom:calc(110px + env(safe-area-inset-bottom));
  }
  button{font:inherit; color:inherit; cursor:pointer;}

  /* ---------- top card ---------- */
  .card{
    background:var(--card); border:2px solid var(--ink); border-radius:22px;
    padding:14px 16px; max-width:640px; margin:0 auto;
  }
  .toprow{display:flex; align-items:center; gap:10px;}
  #songLabel{flex:1; font-size:20px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  #songLabel b{font-weight:800;}
  .icon{
    background:none; border:2px solid var(--ink); border-radius:12px;
    width:38px; height:38px; font-size:18px; line-height:1; flex:none;
  }
  .countbtn{width:auto; padding:0 9px; font-size:12px; font-weight:700; letter-spacing:.02em;}
  .icon.on{background:var(--glow); color:#fff;}
  #countOverlay{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    pointer-events:none; z-index:80;
  }
  #countOverlay.show{display:flex;}
  #countOverlay span{
    font-size:130px; font-weight:800; color:var(--ink);
    text-shadow:0 0 34px rgba(255,140,26,.85);
    animation:countpop 1s ease-out;
  }
  @keyframes countpop{
    from{transform:scale(1.5); opacity:.3;}
    30%{transform:scale(1); opacity:1;}
    to{opacity:.85;}
  }
  .switch{display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; text-align:right; flex:none; cursor:pointer;}
  .switch input{display:none;}
  .switch i{
    width:46px; height:26px; border-radius:13px; background:#c9c9c9; position:relative;
    transition:background .2s; flex:none; display:block;
  }
  .switch i::after{
    content:""; position:absolute; top:2px; left:2px; width:22px; height:22px;
    border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.4); transition:left .2s;
  }
  .switch input:checked + i{background:var(--glow);}
  .switch input:checked + i::after{left:22px;}

  @media (max-width:480px){
    .toprow{flex-wrap:wrap;}
    #songLabel{flex:1 1 100%; font-size:18px;}
  }
  .transport{display:flex; align-items:center; gap:12px; margin-top:12px;}
  .playbtn{
    width:48px; height:48px; border-radius:50%; background:var(--ink); color:#fff;
    border:none; font-size:18px; flex:none; display:flex; align-items:center; justify-content:center;
  }
  #seek{flex:1; accent-color:var(--ink); height:28px;}
  #timeLabel{font-size:15px; font-weight:600; font-variant-numeric:tabular-nums; flex:none;}

  /* ---------- headline ---------- */
  #headline{
    text-align:center; font-size:26px; font-weight:400; line-height:1.25;
    max-width:520px; margin:26px auto 22px;
    cursor:pointer; user-select:none; -webkit-user-select:none;
  }
  #headline b{font-weight:800;}
  body.mini-headline #headline{
    font-size:14px; margin:8px auto 10px; opacity:.55;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:88vw;
  }
  body.mini-headline #headline br{display:none;}

  /* ---------- member rows ---------- */
  #list{max-width:640px; margin:0 auto; display:flex; flex-direction:column; gap:16px;}
  .row{
    display:grid; grid-template-columns:1fr 74px; align-items:center; gap:8px;
    will-change:transform;
  }
  .pill{
    display:inline-flex; align-items:center; gap:12px;
    background:var(--card); border:2px solid var(--ink); border-radius:999px;
    padding:6px 22px 6px 6px; width:max-content; max-width:100%;
  }
  .avatar{
    width:56px; height:56px; border-radius:50%; flex:none;
    border:2px solid var(--ink); overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:800; color:#fff;
    background-size:cover; background-position:center;
    transition:box-shadow .15s;
  }
  .row .name{font-size:24px; font-weight:600; white-space:nowrap;}
  .active .avatar{
    box-shadow:0 0 0 4px var(--glow), 0 0 22px 6px rgba(255,140,26,.65);
  }
  .barwrap{display:flex; align-items:center; gap:8px; margin:6px 0 0 70px; height:16px;}
  .bar{
    height:6px; border-radius:3px; background:var(--ink);
    width:0%; min-width:0; transition:none;
  }
  .barlabel{font-size:15px; font-weight:600; white-space:nowrap; font-variant-numeric:tabular-nums;}
  .total{
    font-size:30px; font-weight:600; text-align:right;
    font-variant-numeric:tabular-nums; align-self:center;
  }

  /* ---------- bottom bar ---------- */
  #bottom{
    position:fixed; left:0; right:0; bottom:0;
    background:linear-gradient(to top, var(--bg) 78%, transparent);
    padding:10px 14px calc(12px + env(safe-area-inset-bottom));
  }
  .pillbtn{
    background:var(--card); border:2px solid var(--ink); border-radius:999px;
    padding:8px 18px; font-size:16px; font-weight:600;
  }
  .pillbtn:disabled{opacity:.35;}
  #holdBar{
    display:flex; align-items:center; justify-content:center; gap:8px;
    max-width:640px; margin:0 auto;
  }
  #holdCircles{
    display:flex; align-items:center; justify-content:center; gap:8px;
    min-width:0; flex:0 1 auto; flex-wrap:wrap;
  }
  .sidebtn{
    flex:none; width:42px; height:42px; border-radius:50%;
    background:var(--card); border:2px solid var(--ink); padding:0;
    font-size:12px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .holdbtn{
    flex:none; width:64px; height:64px;
    border-radius:50%; border:2px solid var(--ink);
    padding:0; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    font-size:26px; font-weight:800; color:#fff;
    background-size:cover; background-position:center;
    touch-action:none; -webkit-touch-callout:none; user-select:none; -webkit-user-select:none;
    transition:box-shadow .15s, transform .1s;
  }
  .holdbtn.active{
    box-shadow:0 0 0 4px var(--glow), 0 0 22px 6px rgba(255,140,26,.65);
    transform:scale(1.06);
  }
  body.playback #holdCircles{opacity:.35; pointer-events:none;}
  /* on phones the list avatars are display-only, but the bottom circles are
     the tap targets — so the list shrinks and the hold buttons grow */
  @media (max-width:560px){
    .holdbtn{width:58px; height:58px; font-size:23px;}
    .sidebtn{width:40px; height:40px;}
    #holdCircles{gap:6px;}
    body{padding-bottom:calc(170px + env(safe-area-inset-bottom));}
    .avatar{width:40px; height:40px; font-size:17px;}
    .pill{gap:9px; padding:5px 16px 5px 5px;}
    .row .name{font-size:19px;}
    .barwrap{margin:5px 0 0 50px;}
    .total{font-size:24px;}
    #list{gap:12px;}
    #headline{font-size:22px; margin:18px auto 16px;}
  }
  @media (max-width:480px){
    .toprow{gap:6px;}
    .icon{width:34px; height:34px; font-size:16px;}
    .countbtn{font-size:11px; padding:0 7px;}
  }

  /* ---------- segment detail view ---------- */
  .segtrack{display:none; align-items:center; gap:2px; height:14px; min-width:0;}
  body.detail .segtrack{display:flex;}
  body.detail .bar{display:none;}
  .subseg{
    position:relative; height:10px; border-radius:5px;
    background:rgba(17,17,17,.16); min-width:7px; cursor:pointer;
  }
  .subseg::after{content:""; position:absolute; inset:-9px -2px;} /* bigger tap target */
  .subseg i{
    position:absolute; left:0; top:0; bottom:0; width:0%;
    background:var(--ink); border-radius:5px; display:block;
  }
  .subseg.live i{background:var(--glow); width:100%;}
  #segChip{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(96px + env(safe-area-inset-bottom));
    background:var(--card); border:2px solid var(--ink); border-radius:999px;
    padding:6px 8px 6px 16px; display:none; align-items:center; gap:12px;
    font-size:14px; font-weight:600; white-space:nowrap; z-index:60;
    box-shadow:0 4px 16px rgba(0,0,0,.18);
  }
  #segChip.show{display:flex;}
  #segChip .pillbtn{padding:5px 14px; font-size:14px;}

  /* ---------- toast ---------- */
  #toast{
    position:fixed; left:50%; bottom:150px; transform:translateX(-50%) translateY(10px);
    background:var(--ink); color:#fff; border-radius:999px; padding:8px 18px;
    font-size:15px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
    z-index:50; white-space:nowrap;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- dialogs ---------- */
  dialog{
    border:2px solid var(--ink); border-radius:22px; padding:20px;
    width:min(92vw, 560px); max-height:86vh;
  }
  dialog::backdrop{background:rgba(0,0,0,.45);}
  dialog h2{margin:0 0 14px; font-size:22px;}
  dialog h3{margin:20px 0 8px; font-size:15px; text-transform:uppercase; letter-spacing:.05em; color:#666;}
  .field{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .field span{width:82px; font-size:14px; font-weight:600; flex:none;}
  .field input[type=text]{
    flex:1; font:inherit; border:2px solid var(--ink); border-radius:10px; padding:7px 10px; min-width:0;
  }
  .mrow{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .mrow .avbtn{
    width:44px; height:44px; border-radius:50%; border:2px solid var(--ink); padding:0;
    overflow:hidden; color:#fff; font-weight:800; font-size:18px; flex:none;
    background-size:cover; background-position:center;
    display:flex; align-items:center; justify-content:center;
  }
  .mrow input[type=text]{flex:1; font:inherit; border:2px solid var(--ink); border-radius:10px; padding:7px 10px; min-width:0;}
  .mrow input[type=color]{width:38px; height:38px; border:none; padding:0; background:none; flex:none; cursor:pointer;}
  .mrow .del{background:none; border:none; font-size:20px; flex:none;}
  .checklabel{display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer;}
  .checklabel input{width:18px; height:18px; flex:none; accent-color:var(--glow);}
  .dlgbtns{display:flex; flex-wrap:wrap; gap:10px; margin-top:16px;}
  .danger{border-color:#c0392b !important; color:#c0392b;}
  .primary{background:var(--ink); color:#fff;}

  /* ---------- distribution ---------- */
  #distBody{display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:24px;}
  #legend{display:flex; flex-direction:column; gap:14px;}
  .leg .lname{font-weight:800; letter-spacing:.03em; font-size:17px;}
  .leg .lnums{font-weight:700; font-size:15px; display:flex; gap:18px; font-variant-numeric:tabular-nums;}
</style>
</head>
<body>

<header class="card">
  <div class="toprow">
    <div id="songLabel"></div>
    <button id="countBtn" class="icon countbtn" title="Count-in: 3 beats before play starts">3·2·1</button>
    <button id="detailBtn" class="icon" title="Show segments"><svg viewBox="0 0 20 20" width="18" height="18"><rect x="1" y="8" width="8" height="4.5" rx="2.2" fill="currentColor"/><rect x="10.5" y="8" width="5" height="4.5" rx="2.2" fill="currentColor"/><rect x="17" y="8" width="2.5" height="4.5" rx="1.2" fill="currentColor"/></svg></button>
    <button id="distBtn" class="icon" title="View distribution"><svg viewBox="0 0 20 20" width="18" height="18"><path d="M9 3 A 8 8 0 1 0 17.6 11.5 L 9 10.5 Z" fill="currentColor"/><path d="M11 2 a8 8 0 0 1 7.5 7 l-7.5 -.6z" fill="currentColor"/></svg></button>
    <button id="undoBtn" class="icon" title="Undo last press">↩</button>
    <button id="gearBtn" class="icon" title="Settings">⚙</button>
    <label class="switch"><span>Playback<br>Mode</span><input type="checkbox" id="modeToggle"><i></i></label>
  </div>
  <div class="transport">
    <button id="playBtn" class="playbtn">▶</button>
    <input type="range" id="seek" min="0" max="180" step="0.01" value="0">
    <div id="timeLabel">0:00 / 3:00</div>
  </div>
</header>

<h1 id="headline"></h1>
<main id="list"></main>
<div id="toast"></div>
<div id="countOverlay"></div>

<footer id="bottom">
  <div id="holdBar">
    <button id="back3Btn" class="sidebtn" title="Back 3 seconds">↺3s</button>
    <div id="holdCircles"></div>
  </div>
</footer>
<div id="segChip"><span></span><button class="pillbtn danger" id="segDelBtn">Delete</button></div>

<dialog id="distDlg">
  <h2>Distribution</h2>
  <div id="distBody"></div>
  <div class="dlgbtns"><button class="pillbtn" id="distClose">Close</button></div>
</dialog>

<dialog id="setDlg">
  <h2>Settings</h2>
  <div class="field"><span>Group</span><input type="text" id="setGroup"></div>
  <div class="field"><span>Song title</span><input type="text" id="setTitle"></div>
  <div class="field"><span>Artist</span><input type="text" id="setArtist"></div>
  <div class="field"><span>Length</span><input type="text" id="setDur" placeholder="3:00"></div>
  <div class="field"><span>Audio</span><button class="pillbtn" id="loadAudioBtn">Load audio file…</button><span id="audioName" style="font-size:13px;color:#666;"></span></div>
  <div class="field"><span>Snap</span><label class="checklabel"><input type="checkbox" id="setSnap"><span>✨ Nudge presses onto the nearest beat/vocal entrance (needs audio)</span></label></div>
  <h3>Members</h3>
  <div id="memberEditor"></div>
  <button class="pillbtn" id="addMemberBtn">+ Add member</button>
  <h3>Data</h3>
  <div class="dlgbtns">
    <button class="pillbtn" id="exportBtn">Export JSON</button>
    <button class="pillbtn" id="importBtn">Import JSON</button>
    <button class="pillbtn danger" id="clearBtn">Clear all timings</button>
  </div>
  <div class="dlgbtns"><button class="pillbtn primary" id="setClose">Done</button></div>
</dialog>

<input type="file" id="audioFile" accept="audio/*" hidden>
<input type="file" id="importFile" accept="application/json,.json" hidden>
<input type="file" id="avatarFile" accept="image/*" hidden>
<audio id="audio" hidden></audio>

<script>
"use strict";
/* ================= state ================= */
const LS_KEY = "line-dist-v1";
const uid = () => Math.random().toString(36).slice(2, 9);

function defaultState() {
  return {
    song: { group: "NewJeans", title: "Magnetic", artist: "ILLIT", duration: 180, audioName: "" },
    members: [
      { id: uid(), name: "Minji",    color: "#6666e0", avatar: null },
      { id: uid(), name: "Hanni",    color: "#f4547c", avatar: null },
      { id: uid(), name: "Danielle", color: "#f79422", avatar: null },
      { id: uid(), name: "Haerin",   color: "#66b466", avatar: null },
      { id: uid(), name: "Hyein",    color: "#bd7ee8", avatar: null },
    ],
    segments: [], // {memberId, start, end} seconds into the song
    mode: "create",
    countIn: false,
    detail: false,
    miniHeadline: false,
    snap: true,
  };
}

let state = defaultState();
try {
  const saved = JSON.parse(localStorage.getItem(LS_KEY));
  if (saved && saved.members && saved.song) state = Object.assign(defaultState(), saved);
} catch (e) {}

let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
    catch (e) { toast("Couldn't save (storage full?)"); }
  }, 250);
}

/* ================= clock (audio or manual) ================= */
const audio = document.getElementById("audio");
let hasAudio = false;
let playing = false;
let baseT = 0, wall = 0; // manual clock

const dur = () => hasAudio && audio.duration ? audio.duration : state.song.duration;
function now() {
  if (hasAudio) return audio.currentTime;
  return playing ? Math.min(dur(), baseT + (performance.now() - wall) / 1000) : baseT;
}
/* count-in: 3 beats before playback starts; holds pressed during the
   count-in become live the instant the song starts */
let countingIn = false, countTimer = null;
const pendingHolds = new Set();
let actx = null;
function beep(freq) {
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === "suspended") actx.resume();
    const o = actx.createOscillator(), g = actx.createGain();
    o.frequency.value = freq || 660;
    o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(0.25, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.15);
    o.start(); o.stop(actx.currentTime + 0.16);
  } catch (e) {}
}
const countOverlay = document.getElementById("countOverlay");
function showCount(n) {
  countOverlay.innerHTML = "<span>" + n + "</span>";
  countOverlay.classList.add("show");
}
function startPlayback() {
  if (hasAudio) audio.play();
  else wall = performance.now();
  playing = true;
  updatePlayBtn();
  const t0 = now();
  for (const id of pendingHolds) holds.set(id, t0);
  pendingHolds.clear();
  updateUndoBtn();
}
function startCountIn() {
  countingIn = true;
  updatePlayBtn();
  let n = 3;
  showCount(n); beep(660);
  countTimer = setInterval(() => {
    n--;
    if (n > 0) { showCount(n); beep(660); }
    else {
      clearInterval(countTimer);
      countingIn = false;
      countOverlay.classList.remove("show");
      beep(990);
      startPlayback();
    }
  }, 1000);
}
function cancelCountIn() {
  clearInterval(countTimer);
  countingIn = false;
  pendingHolds.clear();
  countOverlay.classList.remove("show");
  updatePlayBtn();
}
function play() {
  if (now() >= dur()) seekTo(0);
  if (state.countIn) startCountIn();
  else startPlayback();
}
function pause() {
  if (countingIn) { cancelCountIn(); return; }
  endAllHolds(now());
  if (hasAudio) audio.pause();
  else baseT = now();
  playing = false;
  updatePlayBtn();
}
function seekTo(t) {
  endAllHolds(now());
  t = Math.max(0, Math.min(dur(), t));
  if (hasAudio) audio.currentTime = t;
  else { baseT = t; wall = performance.now(); }
}
audio.addEventListener("ended", () => { endAllHolds(dur()); playing = false; updatePlayBtn(); });

/* ================= segments math ================= */
function mergedSegs(memberId) {
  const list = state.segments
    .filter(s => s.memberId === memberId)
    .map(s => ({ start: s.start, end: s.end }))
    .sort((a, b) => a.start - b.start);
  const out = [];
  for (const s of list) {
    const last = out[out.length - 1];
    if (last && s.start <= last.end) last.end = Math.max(last.end, s.end);
    else out.push({ ...s });
  }
  return out;
}
function totalTime(memberId) {
  return mergedSegs(memberId).reduce((a, s) => a + (s.end - s.start), 0);
}
function timeUpTo(memberId, t) {
  return mergedSegs(memberId).reduce((a, s) => a + Math.max(0, Math.min(s.end, t) - s.start), 0);
}
function activeAt(memberId, t) {
  return mergedSegs(memberId).some(s => s.start <= t && t < s.end);
}

/* ================= holds (create mode) ================= */
const holds = new Map(); // memberId -> start time
function endHold(memberId, at) {
  if (!holds.has(memberId)) return;
  const start = holds.get(memberId);
  holds.delete(memberId);
  const end = at !== undefined ? at : now();
  if (end - start > 0.05) {
    let s = snapToOnset(start), e = snapToOnset(end);
    if (e - s < 0.1) { s = start; e = end; } // never let snapping collapse a segment
    state.segments.push({ memberId, start: s, end: e });
    save();
    renderSegTracks();
  }
  updateUndoBtn();
}
function endAllHolds(at) { [...holds.keys()].forEach(id => endHold(id, at)); }

/* ================= DOM refs ================= */
const $ = id => document.getElementById(id);
const els = {
  songLabel: $("songLabel"), headline: $("headline"), list: $("list"),
  playBtn: $("playBtn"), seek: $("seek"), timeLabel: $("timeLabel"),
  modeToggle: $("modeToggle"), holdCircles: $("holdCircles"), undoBtn: $("undoBtn"),
  distDlg: $("distDlg"), distBody: $("distBody"), setDlg: $("setDlg"),
  toast: $("toast"), memberEditor: $("memberEditor"), audioName: $("audioName"),
};

/* ================= helpers ================= */
function fmt(t) {
  t = Math.max(0, Math.floor(t));
  return Math.floor(t / 60) + ":" + String(t % 60).padStart(2, "0");
}
function parseDur(str) {
  str = String(str).trim();
  if (/^\d+:\d{1,2}$/.test(str)) { const [m, s] = str.split(":").map(Number); return m * 60 + s; }
  const n = parseFloat(str);
  return isNaN(n) ? null : n;
}
let toastTimer = null;
function toast(msg) {
  els.toast.textContent = msg;
  els.toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => els.toast.classList.remove("show"), 1800);
}
function styleAvatar(el, m) {
  if (m.avatar) { el.style.backgroundImage = `url(${m.avatar})`; el.style.backgroundColor = ""; el.textContent = ""; }
  else { el.style.backgroundImage = ""; el.style.backgroundColor = m.color; el.textContent = (m.name[0] || "?").toUpperCase(); }
}

/* ================= build member UI ================= */
const rowEls = new Map();  // memberId -> {row, avatar, name, bar, barlabel, total}
const holdEls = new Map(); // memberId -> button

function renderMembers() {
  els.list.innerHTML = "";
  els.holdCircles.innerHTML = "";
  rowEls.clear();

/* ================= main loop ================= */
let seeking = false;
let lastOrderKey = "";

function displayedTime(memberId, t) {
  if (state.mode === "playback") return timeUpTo(memberId, t);
  let v = totalTime(memberId);
  if (holds.has(memberId)) v += Math.max(0, t - holds.get(memberId));
  return v;
}
function isActive(memberId, t) {
  if (state.mode === "playback") return playing && activeAt(memberId, t);
  return holds.has(memberId) || pendingHolds.has(memberId);
}

function tick() {
  const t = now();
  if (!hasAudio && playing && t >= dur()) { endAllHolds(dur()); baseT = dur(); playing = false; updatePlayBtn(); }

  if (!seeking) els.seek.value = t;
  els.timeLabel.textContent = fmt(t) + " / " + fmt(dur());

  const times = {};
  let max = 0;
  for (const m of state.members) {
    times[m.id] = displayedTime(m.id, t);
    if (times[m.id] > max) max = times[m.id];
  }
  // detail view scales tracks by full recorded totals (incl. live hold), not accrued playback time
  let fullTotals = null, maxFull = 0;
  if (state.detail) {
    fullTotals = {};
    for (const m of state.members) {
      let ft = totalTime(m.id);
      if (state.mode === "create" && holds.has(m.id)) ft += Math.max(0, t - holds.get(m.id));
      fullTotals[m.id] = ft;
      if (ft > maxFull) maxFull = ft;
    }
  }
  for (const m of state.members) {
    const r = rowEls.get(m.id);
    if (!r) continue;
    const v = times[m.id];
    r.bar.style.width = max > 0 ? (v / max * 78) + "%" : "0%";
    r.barlabel.textContent = v.toFixed(1) + "s";
    r.total.textContent = v.toFixed(1);
    r.row.classList.toggle("active", isActive(m.id, t));
    const hb = holdEls.get(m.id);
    if (hb) hb.classList.toggle("active", state.mode === "create" && (holds.has(m.id) || pendingHolds.has(m.id)));
    if (state.detail) {
      const track = r.segtrack;
      track.style.width = maxFull > 0 ? (fullTotals[m.id] / maxFull * 78) + "%" : "0%";
      let liveEl = null;
      for (const el of track.children) {
        if (el.classList.contains("live")) { liveEl = el; continue; }
        const s0 = +el.dataset.start, s1 = +el.dataset.end;
        const frac = s1 > s0 ? Math.max(0, Math.min(1, (t - s0) / (s1 - s0))) : 0;
        el.firstElementChild.style.width = (frac * 100) + "%";
      }
      const holding = state.mode === "create" && holds.has(m.id);
      if (holding) {
        if (!liveEl) {
          liveEl = document.createElement("div");
          liveEl.className = "subseg live";
          liveEl.innerHTML = "<i></i>";
          track.appendChild(liveEl);
        }
        liveEl.style.flex = Math.max(0.05, t - holds.get(m.id)) + " 1 0px";
      } else if (liveEl) liveEl.remove();
    }
  }
  maybeReorder(times);
}

function maybeReorder(times) {
  const sorted = [...state.members].sort((a, b) => times[b.id] - times[a.id]);
  const key = sorted.map(m => m.id).join(",");
  if (key === lastOrderKey) return;
  lastOrderKey = key;
  const before = new Map([...els.list.children].map(c => [c.dataset.id, c.getBoundingClientRect().top]));
  for (const m of sorted) els.list.appendChild(rowEls.get(m.id).row);
  if (document.hidden) return; // skip FLIP animation when frames are paused
  for (const c of els.list.children) {
    const dy = (before.get(c.dataset.id) || 0) - c.getBoundingClientRect().top;
    if (dy) {
      c.style.transition = "none";
      c.style.transform = `translateY(${dy}px)`;
      requestAnimationFrame(() => {
        c.style.transition = "transform .45s cubic-bezier(.22,1,.36,1)";
        c.style.transform = "";
      });
    }
  }
}

function arcPath(cx, cy, r, a0, a1) {
  const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
  const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
  const large = a1 - a0 > Math.PI ? 1 : 0;
  return `M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} Z`;
}

function renderDistribution() {
  const rows = state.members
    .map(m => ({ m, t: totalTime(m.id) }))
    .sort((a, b) => b.t - a.t);
  const sum = rows.reduce((a, r) => a + r.t, 0);
  els.distBody.innerHTML = "";
  if (sum <= 0) {
    els.distBody.innerHTML = "<p>No timings recorded yet — play the song in create mode and hold a member's button during their part.</p>";
    return;
  }
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS, "svg");
  svg.setAttribute("viewBox", "0 0 240 240");
  svg.style.width = "min(64vw, 260px)";
  let a = -Math.PI / 2;
  for (const r of rows) {
    if (r.t <= 0) continue;
    const sweep = r.t / sum * Math.PI * 2;
    const p = document.createElementNS(NS, "path");
    p.setAttribute("d", arcPath(120, 120, 112, a, a + Math.max(0.0001, sweep - 0.02)));
    p.setAttribute("fill", r.m.color);
    svg.appendChild(p);
    a += sweep;
  }
  const c = document.createElementNS(NS, "circle");
  c.setAttribute("cx", 120); c.setAttribute("cy", 120); c.setAttribute("r", 32);
  c.setAttribute("fill", "#cbe94b"); c.setAttribute("stroke", "#fff"); c.setAttribute("stroke-width", 4);
  svg.appendChild(c);

  const legend = document.createElement("div");
  legend.id = "legend";
  for (const r of rows) {
    const d = document.createElement("div");
    d.className = "leg";
    d.style.color = r.m.color;
    const pct = (r.t / sum * 100).toFixed(2);
    d.innerHTML = `<div class="lname"></div><div class="lnums"><span>${r.t.toFixed(2)}s</span><span>${pct}%</span></div>`;
    d.querySelector(".lname").textContent = r.m.name.toUpperCase();
    legend.appendChild(d);
  }
  els.distBody.append(svg, legend);
}

/* audio file — bytes are kept in IndexedDB so the song survives refresh & works offline */
function idbOpen() {
  return new Promise((res, rej) => {
    const rq = indexedDB.open("line-dist-audio", 1);
    rq.onupgradeneeded = () => rq.result.createObjectStore("kv");
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error);
  });
}
function idbSet(key, val) {
  return idbOpen().then(db => new Promise((res, rej) => {
    const tx = db.transaction("kv", "readwrite");
    tx.objectStore("kv").put(val, key);
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  }));
}
function idbGet(key) {
  return idbOpen().then(db => new Promise((res, rej) => {
    const rq = db.transaction("kv").objectStore("kv").get(key);
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error);
  }));
}

/* onset detection: find the moments where the song's energy jumps (beats,
   vocal entrances) so slightly-off presses can snap onto them.
   The number-crunching runs in a Worker so it never stalls playback or taps. */
var onsetTimes = null; // seconds, sorted; null until analysis completes
let onsetToken = 0;
let audioBlob = null; // current audio, kept so analysis can run if snap is enabled later
const ONSET_WORKER_SRC = `onmessage = e => {
  const { chans, sr } = e.data;
  const hop = Math.round(sr * 0.01), hopSec = hop / sr; // 10ms resolution
  const nHops = Math.floor(chans[0].length / hop);
  const energy = new Float32Array(nHops);
  for (const data of chans) {
    for (let i = 0; i < nHops; i++) {
      let s = 0; const off = i * hop;
      for (let j = 0; j < hop; j++) { const v = data[off + j]; s += v * v; }
      energy[i] += s;
    }
  }
  // positive log-energy flux: spikes where sound suddenly gets louder
  const flux = new Float32Array(nHops);
  for (let i = 1; i < nHops; i++) {
    const d = Math.log(energy[i] + 1e-9) - Math.log(energy[i - 1] + 1e-9);
    flux[i] = d > 0 ? d : 0;
  }
  // peaks above an adaptive local threshold become onsets
  const w = 30, times = [];
  for (let i = 1; i < nHops - 1; i++) {
    if (flux[i] <= flux[i - 1] || flux[i] < flux[i + 1]) continue;
    let s = 0, n = 0;
    for (let j = Math.max(0, i - w); j < Math.min(nHops, i + w); j++) { s += flux[j]; n++; }
    if (flux[i] > (s / n) * 2 + 0.05 &&
        (times.length === 0 || i * hopSec - times[times.length - 1] > 0.08)) {
      times.push(i * hopSec);
    }
  }
  postMessage(times);
};`;
function analyzeOnsets(blob) {
  onsetTimes = null;
  const token = ++onsetToken;
  if (state.snap === false) return; // analyzed on demand if the toggle comes on
  // 22050Hz is plenty for 10ms onsets and halves the decode memory/CPU
  blob.arrayBuffer()
    .then(buf => new OfflineAudioContext(1, 1, 22050).decodeAudioData(buf))
    .then(ab => {
      if (token !== onsetToken) return;
      const chans = [];
      for (let c = 0; c < ab.numberOfChannels; c++) {
        const a = new Float32Array(ab.length);
        ab.copyFromChannel(a, c);
        chans.push(a);
      }
      const url = URL.createObjectURL(new Blob([ONSET_WORKER_SRC], { type: "text/javascript" }));
      const worker = new Worker(url);
      URL.revokeObjectURL(url);
      worker.onmessage = e => {
        worker.terminate();
        if (token === onsetToken) onsetTimes = e.data;
      };
      worker.onerror = () => worker.terminate();
      worker.postMessage({ chans, sr: ab.sampleRate }, chans.map(a => a.buffer));
    })
    .catch(() => { onsetTimes = null; });
}
function snapToOnset(t) {
  if (state.snap === false || !hasAudio || !onsetTimes || !onsetTimes.length) return t;
  let lo = 0, hi = onsetTimes.length - 1;
  while (lo < hi) { const mid = (lo + hi) >> 1; if (onsetTimes[mid] < t) lo = mid + 1; else hi = mid; }
  let best = onsetTimes[lo];
  if (lo > 0 && Math.abs(onsetTimes[lo - 1] - t) < Math.abs(best - t)) best = onsetTimes[lo - 1];
  return Math.abs(best - t) <= 0.15 ? best : t;
}

function attachAudio(blob, name, persist) {
  pause();
  const onMeta = () => {
    cleanup();
    hasAudio = true;
    audioBlob = blob;
    analyzeOnsets(blob);
    state.song.audioName = name;
    state.song.duration = audio.duration; // the file is the source of truth for length
    seekTo(0);
    renderSongMeta();
    if (els.setDlg.open) renderSettings();
    save();
    toast((persist ? "Audio loaded: " : "Audio restored: ") + name);
    if (persist) idbSet("current", { name, blob }).catch(() => toast("Audio won't survive a refresh (storage full?)"));
  };
  const onErr = () => {
    cleanup();
    audio.removeAttribute("src");
    hasAudio = false;
    toast("Couldn't play \"" + name + "\" — doesn't seem to be an audio file");
  };
  const cleanup = () => {
    audio.removeEventListener("loadedmetadata", onMeta);
    audio.removeEventListener("error", onErr);
  };
  audio.addEventListener("loadedmetadata", onMeta);
  audio.addEventListener("error", onErr);
  audio.src = URL.createObjectURL(blob);
}
function tryRestoreAudio() {
  idbGet("current").then(rec => {
    if (!rec || hasAudio) return;
    if (!state.song.audioName || state.song.audioName !== rec.name) return; // stored audio belongs to another song
    attachAudio(rec.blob, rec.name, false);
  }).catch(() => {});
}
// iOS's file picker grays out audio files that don't match its type registry,
// so on iOS we drop the filter and validate the pick by loading it instead
if (/iP(hone|ad|od)/.test(navigator.userAgent) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1)) {

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${state.song.group}-${state.song.title}.linedist.json`.replace(/\s+/g, "-").toLowerCase();
  a.click();
  URL.revokeObjectURL(a.href);
});
$("importBtn").addEventListener("click", () => $("importFile").click());
$("importFile").addEventListener("change", () => {
  const file = $("importFile").files[0];
  $("importFile").value = "";
  if (!file) return;
  file.text().then(txt => {
    const data = JSON.parse(txt);
    if (!data.members || !data.song) throw new Error("bad file");
    pause();
    hasAudio = false; audio.removeAttribute("src");
    state = Object.assign(defaultState(), data);
    renderAll(); renderSettings(); save();
    tryRestoreAudio(); // reattach stored audio if it belongs to this song
    toast("Loaded " + state.song.title);
  }).catch(() => toast("Couldn't read that file"));
});

/* ================= boot ================= */
function renderAll() {
  renderSongMeta();
  renderMembers();
  els.modeToggle.checked = state.mode === "playback";
  document.body.classList.toggle("playback", state.mode === "playback");
  $("countBtn").classList.toggle("on", !!state.countIn);
  $("detailBtn").classList.toggle("on", !!state.detail);
  document.body.classList.toggle("detail", !!state.detail);
  document.body.classList.toggle("mini-headline", !!state.miniHeadline);
  renderSegTracks();
  updateUndoBtn();
  updatePlayBtn();
}
renderAll();
tryRestoreAudio();
(function rafLoop() { tick(); requestAnimationFrame(rafLoop); })();
setInterval(tick, 300); // rAF pauses in hidden tabs; keep timers/labels current anyway

/* offline support: cache the app shell so it runs with no connection (subway-proof) */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
if (navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(() => {});
</script>
</body>
</html>
